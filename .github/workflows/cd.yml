name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy-and-test:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/boston-housing-api:latest

      - name: Run container
        run: |
          docker run -d --name boston-housing-api -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/boston-housing-api:latest

      - name: Wait for API
        run: |
          python - <<'PY'
          import time
          import requests

          url = "http://127.0.0.1:8000/health"
          for _ in range(30):
              try:
                  response = requests.get(url, timeout=5)
                  if response.status_code == 200:
                      print("API is ready")
                      break
              except Exception:
                  pass
              time.sleep(2)
          else:
              raise RuntimeError("API did not become ready in time")
          PY

      - name: Run functional scenario
        run: |
          python scripts/run_scenario.py

      - name: Show container logs on failure
        if: failure()
        run: docker logs boston-housing-api

      - name: Stop container
        if: always()
        run: docker rm -f boston-housing-api
