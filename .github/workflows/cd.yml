name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy-and-functional-test:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      APP_ENV: dev
      MODEL_VERSION: cd-model
      MSSQL_SERVER: mssql
      MSSQL_PORT: "1433"
      MSSQL_DATABASE: BostonHousingDB
      MSSQL_USER: sa
      MSSQL_PASSWORD: ${{ secrets.MSSQL_PASSWORD }}
      MSSQL_DRIVER: ODBC Driver 18 for SQL Server
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies for functional scenario
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create .env file
        run: |
          cat > .env <<EOF
          APP_ENV=${APP_ENV}
          MODEL_VERSION=${MODEL_VERSION}
          MSSQL_SERVER=${MSSQL_SERVER}
          MSSQL_PORT=${MSSQL_PORT}
          MSSQL_DATABASE=${MSSQL_DATABASE}
          MSSQL_USER=${MSSQL_USER}
          MSSQL_PASSWORD=${MSSQL_PASSWORD}
          MSSQL_DRIVER=${MSSQL_DRIVER}
          JWT_SECRET_KEY=${JWT_SECRET_KEY}
          JWT_ALGORITHM=${JWT_ALGORITHM}
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
          EOF

      - name: Start services with docker compose
        run: docker compose up --build -d

      - name: Apply migrations
        run: docker compose exec -T api alembic upgrade head

      - name: Train model
        run: docker compose exec -T api python -m src.train

      - name: Run functional scenario
        run: python scripts/run_scenario.py

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs api
          docker compose logs mssql
          docker compose logs mssql-init

      - name: Stop services
        if: always()
        run: docker compose down -v
