name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    env:
      LOCAL_IMAGE_NAME: boston-housing-api:latest
      REMOTE_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/boston-housing-api:latest
      MSSQL_SERVER: dummy
      MSSQL_PORT: "1433"
      MSSQL_DATABASE: dummy
      MSSQL_USER: dummy
      MSSQL_PASSWORD: dummy
      MSSQL_DRIVER: ODBC Driver 18 for SQL Server
      JWT_SECRET_KEY: test_secret_key_123456789
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      MODEL_VERSION: ci-test-model

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies for pyodbc
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc unixodbc-dev gcc g++

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit and integration tests
        run: |
          pytest -q

      - name: Build Docker image
        run: |
          docker build -t $LOCAL_IMAGE_NAME .

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker image for Docker Hub
        if: github.event_name == 'push'
        run: |
          docker tag $LOCAL_IMAGE_NAME $REMOTE_IMAGE_NAME

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push $REMOTE_IMAGE_NAME
